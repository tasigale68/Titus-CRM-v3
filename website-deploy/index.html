    <h1>Titus CRM — AI-Powered CRM for Australian NDIS Providers</h1>
    <p>Titus CRM is an Australian-built, AI-powered all-in-one platform for NDIS, Aged Care and Community Service providers. It replaces 5 separate tools — CRM, rostering, HR, recruitment, compliance — with one system, saving providers $64,000+ per year in admin costs.</p>

    <h2>Why NDIS Providers Choose Titus CRM</h2>
    <p>You didn't start a care business to spend every night on spreadsheets. Titus handles rostering, HR, recruitment, billing, compliance, and 24/7 AI phone coverage so you can get back to your family, your team, and your life.</p>

    <h2>Key Features</h2>
    <ul>
      <li><strong>24/7 AI Agent (Add-on)</strong> — Denise answers calls around the clock, triages enquiries, takes messages. Available as an add-on to any tier.</li>
      <li><strong>15 QMS Compliance Registers</strong> — incidents, complaints, risks, medications, worker screening, consent, feedback, training, restrictive practices, behaviour support plans, and more — all audit-ready.</li>
      <li><strong>NDIS Auditor AI</strong> — continuous compliance scanning across all 15 registers. Generates audit-readiness scores, flags gaps, and simulates what an auditor would look for.</li>
      <li><strong>SCHADS-Compliant Rostering</strong> — drag-and-drop scheduling with real-time budget tracking and compliance monitoring.</li>
      <li><strong>Full HR &amp; Recruitment ATS</strong> — Kanban pipeline, AI CV extraction, compliance cert tracking, digital document signing.</li>
      <li><strong>Browser Softphone</strong> — inbound and outbound calls, call recording, transcripts, SMS — all from your browser.</li>
      <li><strong>AI Report Writing</strong> — generates progress notes, incident reports, and end-of-plan summaries from your data in seconds.</li>
      <li><strong>Voice-to-Text Notes</strong> — dictate progress notes and incident reports on the spot, auto-saved to participant records.</li>
      <li><strong>Digital Service Agreements</strong> — create, send, and track NDIS service agreements with automated plan expiry reminders.</li>
      <li><strong>Client Budget Tracking</strong> — SIL, Community Access, Transport with live utilisation bars and real-time deductions.</li>
      <li><strong>Contractor ABN Validation</strong> — verify ABN, check GST registration, flag expired documents automatically.</li>
    </ul>

    <h2>Simple Pricing — No Per-User Charges</h2>
    <ul>
      <li><strong>Foundation — $149/week +GST</strong> — Small-medium providers, 1–15 staff. Everything you need to run your NDIS business.</li>
      <li><strong>Growth — $349/week +GST</strong> — Growing providers, 10–40 staff. AI-powered operations with 24/7 coverage. Replaces 4–5 tools.</li>
      <li><strong>Scale — $749/week +GST</strong> — Registered providers, 30+ staff. Total operational automation. The platform that pays for itself.</li>
    </ul>
    <p>All plans: 14-day free trial. No per-user fees. Cancel anytime. Paid weekly in advance. Implementation: $1,999 (Foundation) | $4,999 (Growth) | $9,999 (Scale) — all +GST.</p>

    <h2>Built for Australian NDIS Compliance</h2>
    <p>Titus CRM includes NDIS compliance built in — 15 QMS compliance registers, NDIS Auditor AI with continuous compliance scanning, SCHADS Award tracking, automated incident reporting to the NDIS Quality and Safeguards Commission, progress notes, audit logs, and plan expiry reminders. All data is hosted in Australia.</p>

    <h2>What Problem Does Titus Solve?</h2>
    <p>NDIS providers spend 10+ hours every week on admin: writing reports (4 hrs), chasing timesheets and shift reminders (3 hrs), tracking compliance certs (2 hrs), managing service agreements (1 hr), and answering after-hours calls (24/7). Titus automates all of this — giving you evenings with your family instead of writing reports, weekends off instead of chasing timesheets, and audits that don't keep you up at night.</p>

    <h2>Frequently Asked Questions</h2>
    <h3>How much does Titus CRM cost?</h3>
    <p>Titus CRM starts from $149/week +GST (Foundation), $349/week +GST (Growth), or $749/week +GST (Scale). Flat weekly fee paid in advance with no per-user charges. Implementation fees from $1,999 +GST.</p>
    <h3>What tools does Titus CRM replace?</h3>
    <p>Titus replaces 3-5 separate tools: CRM, rostering, HR, recruitment ATS, payroll, compliance tracking, phone system, and AI automation — all in one platform.</p>
    <h3>Is Titus CRM NDIS compliant?</h3>
    <p>Yes. 15 QMS compliance registers, NDIS Auditor AI with continuous compliance scanning, SCHADS compliance monitoring, incident reporting, audit logs, and all data hosted in Australia.</p>
    <h3>What is the 24/7 AI Voice Agent?</h3>
    <p>Denise is an always-on AI receptionist available as an add-on to any Titus tier for $69.95/week +GST. She answers calls around the clock — nights, weekends, public holidays — handling sick leave, shift enquiries, message taking, and urgent routing. Phone line rental and usage billed separately.</p>
    <h3>Does Titus handle SCHADS compliance?</h3>
    <p>Yes. SCHADS compliance is built into every shift — ordinary rates, Saturday ×1.5, Sunday ×2.0, public holiday ×2.5, overtime triggers, sleepover and broken shift allowances.</p>

    <h2>Join the Waitlist</h2>
    <p>Be the first to know when Titus launches. Email <a href="mailto:info@titus-crm.com">info@titus-crm.com</a> or visit <a href="https://www.titus-crm.com">www.titus-crm.com</a>.</p>

    <h2>About Titus CRM</h2>
    <p>Titus CRM is built in Brisbane, Australia by an NDIS and Aged Care provider who experienced the admin pain firsthand. Purpose-built for Australian disability, aged care, and community service organisations.</p>

strokeLinecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>,alert:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>,task:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>,target:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg>,robot:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="8" width="18" height="12" rx="2"/><path d="M12 2v6"/><circle cx="8" cy="14" r="1.5" fill="currentColor"/><circle cx="16" cy="14" r="1.5" fill="currentColor"/><path d="M9 18h6"/></svg>,contact:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,cal:<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>};

const Counter=({end,suffix="",prefix=""})=>{const[count,setCount]=useState(0);const ref=useRef(null);useEffect(()=>{const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){let s=0;const step=end/40;const t=setInterval(()=>{s+=step;if(s>=end){setCount(end);clearInterval(t)}else setCount(Math.floor(s))},30);obs.disconnect()}},{threshold:0.5});if(ref.current)obs.observe(ref.current);return()=>obs.disconnect()},[end]);return <span ref={ref}>{prefix}{count.toLocaleString()}{suffix}</span>};
const fmt=(n)=>"$"+Math.round(n).toLocaleString();
const fmtK=(n)=>n>=1000?"$"+Math.round(n/1000)+"k":fmt(n);

const ROLES=[
  {id:"roster_officer",title:"Roster Officer",salary:80000,desc:"Scheduling, shift management, SCHADS compliance, overtime",pct:75,how:"AI scheduling, SCHADS auto-compliance, drag-drop rostering, overtime alerts",icon:I.cal},
  {id:"team_leader",title:"Team Leader",salary:100000,desc:"Team oversight, approvals, incidents, KPIs, performance",pct:40,how:"Task management, AI reports, auto incident logging, real-time dashboards",icon:I.users},
  {id:"admin_coordinator",title:"Admin Coordinator",salary:70000,desc:"Data entry, phones, filing, calendar, chasing paperwork",pct:80,how:"Centralised contacts, 24/7 AI phone agent, auto-filing, task tracking",icon:I.task},
  {id:"hr_officer",title:"HR / Recruitment Officer",salary:85000,desc:"Job ads, screening, interviews, onboarding, compliance",pct:70,how:"Full ATS pipeline, digital doc signing, compliance tracking, auto onboarding",icon:I.contact},
  {id:"accounts_admin",title:"Accounts / Billing Admin",salary:75000,desc:"Invoices, payroll prep, NDIS claims, contractor management",pct:85,how:"Auto-invoicing from rosters, SCHADS payroll engine, contractor ABN invoices, Xero journal export",icon:I.dollar},
  {id:"intake_officer",title:"Intake / Referral Officer",salary:72000,desc:"New referrals, assessments, service agreements",pct:60,how:"Leads pipeline, auto-referral capture, agreement builder, reminders",icon:I.target},
  {id:"receptionist",title:"Receptionist / Phone Handler",salary:58000,desc:"Inbound calls, messages, appointments, enquiry routing",pct:90,how:"24/7 AI Agent answers every call, transcribes, routes urgents, never sick",icon:I.phone},
];

const StaffCalc=()=>{
  const[staff,setStaff]=useState([{roleId:"roster_officer",count:1},{roleId:"team_leader",count:1},{roleId:"accounts_admin",count:1}]);
  const[tier,setTier]=useState(149);const[expanded,setExpanded]=useState(null);const[showTable,setShowTable]=useState(false);
  const addRole=(id)=>{const e=staff.find(s=>s.roleId===id);if(e)setStaff(staff.map(s=>s.roleId===id?{...s,count:s.count+1}:s));else setStaff([...staff,{roleId:id,count:1}])};
  const adj=(id,d)=>setStaff(staff.map(s=>s.roleId===id?{...s,count:Math.max(0,s.count+d)}:s).filter(s=>s.count>0));
  const rem=(id)=>setStaff(staff.filter(s=>s.roleId!==id));
  const calc=(id,n)=>{const r=ROLES.find(p=>p.id===id);if(!r)return{};const b=r.salary*n,su=b*0.115,on=b*0.08,tr=2500*n,tot=b+su+on+tr;return{b,su,on,tr,tot,auto:tot*(r.pct/100),pct:r.pct}};
  let totC=0,totA=0;
  const rows=staff.map(s=>{const r=ROLES.find(p=>p.id===s.roleId);const c=calc(s.roleId,s.count);totC+=c.tot||0;totA+=c.auto||0;return{...s,r,c}});
  const tAnn=tier*52,net=totA-tAnn,wk=net/52;
  const avail=ROLES.filter(r=>!staff.find(s=>s.roleId===r.id));

  return(<div>
    <div style={{background:C.redLight,borderRadius:16,padding:"24px 28px",marginBottom:32,border:"1px solid "+C.redPale}}>
      <div style={{display:"flex",alignItems:"flex-start",gap:16}}>
        <div style={{color:C.red,flexShrink:0,marginTop:2}}>{I.alert}</div>
        <div>
          <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:19,color:C.text,fontWeight:700,marginBottom:8}}>Be honest with yourself for 30 seconds.</div>
          <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:C.textSoft,lineHeight:1.7,margin:0}}>How many hours this week did you spend chasing timesheets, fixing roster gaps, writing progress notes that should write themselves, and answering calls that an AI could handle at 3am?<span style={{color:C.gold,fontWeight:600}}> Add your admin team below. See what it's really costing you.</span></p>
        </div>
      </div>
    </div>

    <div style={{display:"flex",flexDirection:"column",gap:12,marginBottom:24}}>
      {rows.map(({roleId,count,r,c})=>(<div key={roleId} style={{background:C.card,borderRadius:16,border:"1px solid "+(expanded===roleId?C.gold+"55":C.cardBorder),overflow:"hidden",transition:"all 0.25s",boxShadow:"0 1px 4px rgba(0,0,0,0.04)"}}>
        <div style={{padding:"18px 20px",display:"flex",alignItems:"center",gap:14,flexWrap:"wrap"}}>
          <div style={{width:42,height:42,borderRadius:12,background:C.goldPale,display:"flex",alignItems:"center",justifyContent:"center",color:C.gold,flexShrink:0}}>{r.icon}</div>
          <div style={{flex:1,minWidth:160,cursor:"pointer"}} onClick={()=>setExpanded(expanded===roleId?null:roleId)}>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:15,fontWeight:600,color:C.text}}>{r.title}</div>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:11.5,color:C.textMuted,marginTop:2}}>{r.desc}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
            <button onClick={()=>adj(roleId,-1)} style={{width:34,height:34,borderRadius:10,background:C.bg2,border:"1px solid "+C.cardBorder,color:C.gold,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{I.minus}</button>
            <span style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:24,fontWeight:700,color:C.text,width:38,textAlign:"center",display:"inline-block"}}>{count}</span>
            <button onClick={()=>adj(roleId,1)} style={{width:34,height:34,borderRadius:10,background:C.bg2,border:"1px solid "+C.cardBorder,color:C.gold,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}>{I.plus}</button>
          </div>
          <div style={{textAlign:"right",minWidth:110,flexShrink:0}}>
            <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:20,fontWeight:700,color:C.red}}>{fmt(c.tot)}</div>
            <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:10.5,color:C.textMuted}}>per year inc. super & oncosts</div>
          </div>
          <button onClick={()=>rem(roleId)} style={{width:32,height:32,borderRadius:8,background:"transparent",border:"1px solid "+C.redPale,color:C.red+"88",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}}>{I.trash}</button>
        </div>
        <div style={{padding:"0 20px 12px",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:10.5,color:C.textMuted,flexShrink:0,minWidth:82}}>Titus automates</span>
          <div style={{flex:1,height:7,background:C.bg3,borderRadius:4,overflow:"hidden"}}><div style={{width:c.pct+"%",height:"100%",background:"linear-gradient(90deg,"+C.gold+","+C.green+")",borderRadius:4,transition:"width 0.6s ease"}}/></div>
          <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:C.green,fontWeight:700,minWidth:32,textAlign:"right"}}>{c.pct}%</span>
          <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:C.green,fontWeight:600,minWidth:85,textAlign:"right"}}>= {fmt(c.auto)} saved</span>
        </div>
        {expanded===roleId&&(<div style={{padding:"0 20px 18px"}}><div style={{background:C.greenLight,borderRadius:12,padding:"14px 18px",border:"1px solid "+C.greenPale}}>
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:11,color:C.green,letterSpacing:1,fontWeight:600,marginBottom:8}}>WHAT TITUS REPLACES FOR THIS ROLE:</div>
          <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.textSoft,lineHeight:1.7}}>{r.how}</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:8,marginTop:12,fontSize:11,fontFamily:"'Plus Jakarta Sans',sans-serif"}} className="calc-results">
            {[{l:"Base",v:c.b},{l:"Super 11.5%",v:c.su},{l:"Oncosts 8%",v:c.on},{l:"Training",v:c.tr}].map(x=>(<div key={x.l} style={{background:C.bg,borderRadius:8,padding:10,textAlign:"center",border:"1px solid "+C.cardBorder}}><div style={{color:C.textMuted,marginBottom:2}}>{x.l}</div><div style={{color:C.text,fontWeight:600}}>{fmt(x.v)}</div></div>))}
          </div>
        </div></div>)}
      </div>))}
    </div>

    {avail.length>0&&(<div style={{marginBottom:28}}>
      <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:11,color:C.textMuted,letterSpacing:1,marginBottom:10}}>+ ADD MORE ADMIN ROLES</div>
      <div style={{display:"flex",flexWrap:"wrap",gap:8}}>
        {avail.map(r=>(<button key={r.id} onClick={()=>addRole(r.id)} style={{background:C.bg,border:"1px solid "+C.cardBorder,borderRadius:10,padding:"9px 16px",color:C.textSoft,fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",gap:6,transition:"all 0.2s"}}><span style={{color:C.gold}}>{I.plus}</span>{r.title}<span style={{color:C.textMuted,fontSize:11}}>({fmtK(r.salary)}/yr)</span></button>))}
      </div>
    </div>)}

    <div style={{background:C.bg,borderRadius:14,padding:"18px 22px",border:"1px solid "+C.cardBorder,marginBottom:28}}>
      <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:11,color:C.gold,letterSpacing:1.5,marginBottom:12,fontWeight:600}}>SELECT YOUR TITUS PLAN</div>
      <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
        {[{l:"Foundation",p:149,n:"1–15 staff"},{l:"Growth",p:349,n:"10–40 staff"},{l:"Scale",p:749,n:"30+ staff"}].map(t=>(<button key={t.p} onClick={()=>setTier(t.p)} style={{flex:1,minWidth:120,background:tier===t.p?"linear-gradient(135deg,"+C.gold+","+C.goldLight+")":C.bg2,color:tier===t.p?"#fff":C.textSoft,border:"1px solid "+(tier===t.p?C.gold:C.cardBorder),borderRadius:12,padding:"12px 16px",fontFamily:"'Plus Jakarta Sans',sans-serif",cursor:"pointer",textAlign:"center",transition:"all 0.2s"}}><div style={{fontSize:14,fontWeight:700}}>{t.l} — ${t.p}/wk +GST</div><div style={{fontSize:11,opacity:0.7,marginTop:2}}>{t.n}</div></button>))}
      </div>
    </div>

    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:16,marginBottom:24}} className="calc-results">
      <div style={{background:C.redLight,borderRadius:18,padding:"28px 22px",border:"1px solid "+C.redPale,textAlign:"center"}}>
        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:10.5,color:C.red,letterSpacing:1.5,fontWeight:600,marginBottom:10}}>CURRENT ADMIN COST</div>
        <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:34,fontWeight:800,color:C.red}}>{fmt(totC)}</div>
        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:C.textMuted,marginTop:4}}>per year</div>
        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.red+"CC",marginTop:6}}>{fmt(totC/52)}/wk walking out the door</div>
      </div>
      <div style={{background:C.greenLight,borderRadius:18,padding:"28px 22px",border:"1px solid "+C.greenPale,textAlign:"center"}}>
        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:10.5,color:C.green,letterSpacing:1.5,fontWeight:600,marginBottom:10}}>TITUS AUTOMATES</div>
        <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:34,fontWeight:800,color:C.green}}>{fmt(totA)}</div>
        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:C.textMuted,marginTop:4}}>worth of work/year</div>
        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.green+"CC",marginTop:6}}>Titus: {fmt(tAnn)}/yr ({fmt(tier)}/wk +GST)</div>
      </div>
      <div style={{background:C.goldBg,borderRadius:18,padding:"28px 22px",border:"1px solid "+C.goldPale,textAlign:"center"}}>
        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:10.5,color:C.gold,letterSpacing:1.5,fontWeight:600,marginBottom:10}}>YOUR NET SAVINGS</div>
        <div style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:34,fontWeight:800,color:net>0?C.gold:C.red}}>{net>0?"+":""}{fmt(Math.abs(net))}</div>
        <div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:C.textMuted,marginTop:4}}>per year{net>0?" back in your pocket":""}</div>
        {wk>0&&<div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:C.gold,fontWeight:700,marginTop:6}}>{fmt(wk)}/week saved</div>}
      </div>
    </div>

    <button onClick={()=>setShowTable(!showTable)} style={{background:C.bg2,border:"1px solid "+C.cardBorder,borderRadius:10,padding:"11px 20px",color:C.textSoft,fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,cursor:"pointer",width:"100%",textAlign:"center",marginBottom:showTable?16:0}}>{showTable?"Hide":"Show"} Full Breakdown</button>

    {showTable&&(<div style={{background:C.bg,borderRadius:14,overflow:"hidden",border:"1px solid "+C.cardBorder,marginBottom:24}}><div style={{overflowX:"auto"}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12}}>
        <thead><tr style={{borderBottom:"2px solid "+C.bg3}}>{["Role","#","Base","Super","Oncosts","Training","Total","Saves"].map(h=><th key={h} style={{padding:"12px 14px",textAlign:"left",color:C.gold,fontWeight:600,fontSize:11,whiteSpace:"nowrap",background:C.bg2}}>{h}</th>)}</tr></thead>
        <tbody>
          {rows.map(({roleId,count,r,c})=>(<tr key={roleId} style={{borderBottom:"1px solid "+C.bg3}}><td style={{padding:"11px 14px",color:C.text,fontWeight:500}}>{r.title}</td><td style={{padding:"11px 14px",color:C.text,textAlign:"center"}}>{count}</td><td style={{padding:"11px 14px",color:C.text}}>{fmt(c.b)}</td><td style={{padding:"11px 14px",color:C.text}}>{fmt(c.su)}</td><td style={{padding:"11px 14px",color:C.text}}>{fmt(c.on)}</td><td style={{padding:"11px 14px",color:C.text}}>{fmt(c.tr)}</td><td style={{padding:"11px 14px",color:C.red,fontWeight:700}}>{fmt(c.tot)}</td><td style={{padding:"11px 14px",color:C.green,fontWeight:700}}>{fmt(c.auto)}</td></tr>))}
          <tr style={{background:C.goldBg}}><td colSpan={6} style={{padding:"12px 14px",color:C.text,fontWeight:700}}>TOTALS</td><td style={{padding:"12px 14px",color:C.red,fontWeight:800,fontSize:14}}>{fmt(totC)}</td><td style={{padding:"12px 14px",color:C.green,fontWeight:800,fontSize:14}}>{fmt(totA)}</td></tr>
        </tbody>
      </table>
    </div></div>)}

                <th style={{padding:"14px 16px",textAlign:"center",fontWeight:700,color:C.gold,borderBottom:"2px solid "+C.cardBorder,minWidth:90}}>Foundation</th>
                <th style={{padding:"14px 16px",textAlign:"center",fontWeight:700,color:C.gold,borderBottom:"2px solid "+C.cardBorder,minWidth:90}}>Growth</th>
                <th style={{padding:"14px 16px",textAlign:"center",fontWeight:700,color:C.gold,borderBottom:"2px solid "+C.cardBorder,minWidth:90}}>Scale</th>
              </tr></thead>
              <tbody>{features.map((ft,i)=>(

                  <td style={{padding:"10px 16px",color:C.text}}>{ft.n}</td>
                  <td style={{padding:"10px 16px",textAlign:"center"}}>{ft.f?tick:dash}</td>
                  <td style={{padding:"10px 16px",textAlign:"center"}}>{ft.g?tick:dash}</td>
                  <td style={{padding:"10px 16px",textAlign:"center"}}>{ft.s?tick:dash}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        </div>);
      })()}

        <div style={{position:"relative",zIndex:1}}>
          <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:16}}>
            <div style={{width:14,height:14,borderRadius:"50%",background:C.green,animation:"pulseG 2s infinite"}}/>
            <span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.green,letterSpacing:2,fontWeight:700}}>ADD-ON</span>
          </div>

          </div>

          <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:C.textSoft,lineHeight:1.7,marginBottom:16}}>AI receptionist answers calls 24/7 — nights, weekends, public holidays. Handles sick leave, shift enquiries, message taking, and urgent issue routing.</p>
          <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:C.textSoft,lineHeight:1.7,marginBottom:16}}>Titus provisions your dedicated Australian phone number.</p>
          <p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:C.textMuted}}>Phone line rental: monthly in advance. Call & SMS usage: monthly in arrears.</p>
        </div>
      </div>
    </div></section>

    <section style={{background:C.bg2}}><div className="section-pad" style={{padding:"80px 24px"}}><div style={{maxWidth:700,margin:"0 auto",textAlign:"center"}}><div style={{display:"flex",justifyContent:"center",gap:4,marginBottom:20}}>{[1,2,3,4,5].map(i=><span key={i}>{I.star}</span>)}</div><blockquote style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:"clamp(20px, 3vw, 28px)",color:C.text,lineHeight:1.5,fontWeight:400,fontStyle:"italic",marginBottom:24}}>"I used to be in the office until 10pm every night. Now the AI writes my reports, handles after-hours calls, and my roster runs itself. I actually made it to my daughter's netball game last Saturday."</blockquote><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:C.gold,fontWeight:600}}>Delta Community Support</div><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:C.textMuted,marginTop:4}}>Brisbane, QLD — Live on Titus CRM</div></div></div></section>

    <section style={{background:C.bg2}}><div className="section-pad" style={{maxWidth:1200,margin:"0 auto",padding:"80px 24px",textAlign:"center"}}><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.gold,letterSpacing:3,fontWeight:600,marginBottom:12}}>TRUSTED NETWORK</div><h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:"clamp(28px, 4vw, 38px)",fontWeight:800,color:C.text,marginBottom:8}}>Our Current Partners</h2><p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:15,color:C.textMuted,marginBottom:48,maxWidth:560,margin:"0 auto 48px"}}>We're proud to work alongside leading disability and community service providers across Australia.</p><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(250px,1fr))",gap:24}}>{[{name:"Delta Community",location:"Brisbane, Australia",url:"https://www.deltacommunity.com.au",logo:"/partners/delta-community.png"},{name:"Meadow Street",location:"Melbourne, Victoria",url:"https://www.meadowstreet.com.au",logo:"/partners/meadow-street.png"},{name:"Amaiya Support",location:"Melbourne, Victoria",url:"https://www.amaiyasupport.com.au",logo:"/partners/amaiya-support.png"},{name:"Pineula Care Services",location:"Brisbane, Australia",url:"https://www.pineulacareservices.com",logo:"/partners/pineula.png"}].map((p,i)=><a key={i} href={p.url} target="_blank" rel="noopener noreferrer" style={{background:C.card,borderRadius:20,padding:"32px 24px",border:"1px solid "+C.cardBorder,textDecoration:"none",display:"flex",flexDirection:"column",alignItems:"center",gap:16,transition:"all .3s",cursor:"pointer"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-4px)";e.currentTarget.style.boxShadow="0 12px 40px rgba(0,0,0,.08)";e.currentTarget.style.borderColor=C.gold+"50"}} onMouseLeave={e=>{e.currentTarget.style.transform="";e.currentTarget.style.boxShadow="";e.currentTarget.style.borderColor=C.cardBorder}}><div style={{width:140,height:100,display:"flex",alignItems:"center",justifyContent:"center"}}><img src={p.logo} alt={p.name+" logo"} style={{maxWidth:"100%",maxHeight:"100%",objectFit:"contain"}}/></div><h3 style={{fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:17,color:C.text,margin:0}}>{p.name}</h3><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.textMuted}}>{p.location}</div><span style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.gold,fontWeight:600,display:"flex",alignItems:"center",gap:6}}>Visit Website {I.arrow}</span></a>)}</div></div></section>

    <section id="waitlist" style={{background:C.bg}}><div className="section-pad" style={{maxWidth:800,margin:"0 auto",padding:"100px 24px"}}><div style={{textAlign:"center",marginBottom:48}}><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.gold,letterSpacing:3,fontWeight:600,marginBottom:12}}>GET EARLY ACCESS</div><h2 style={{fontFamily:"'Space Grotesk',sans-serif",fontSize:"clamp(28px, 4vw, 38px)",fontWeight:800,color:C.text}}>Join the Waitlist</h2><p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:15,color:C.textMuted,marginTop:8}}>Be the first to know when Titus launches. We'll be in touch.</p></div><div style={{background:C.card,borderRadius:20,padding:"32px 28px",border:"1px solid "+C.cardBorder,boxShadow:"0 2px 8px rgba(0,0,0,0.04)"}}><WaitlistForm/></div></div></section>

    <footer style={{background:C.dark,color:"#fff"}}><div className="section-pad" style={{maxWidth:1200,margin:"0 auto",padding:"80px 24px"}}><div style={{display:"grid",gridTemplateColumns:"2fr 1fr 1fr",gap:48}} className="footer-grid"><div><TitusLogo size={40} dark={true}/><p style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:14,color:"#999",lineHeight:1.7,marginTop:16,maxWidth:360}}>AI-powered all-in-one CRM built for Australian NDIS, Aged Care & Community Service providers.</p><a href="mailto:info@titus-crm.com" style={{display:"inline-flex",alignItems:"center",gap:8,color:C.goldLight,fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,textDecoration:"none",marginTop:16}}>{I.mail} info@titus-crm.com</a></div><div><h4 style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.goldLight,letterSpacing:2,fontWeight:600,marginBottom:20}}>PLATFORM</h4>{["Features","Pricing","Calculator","QMS"].map(l=><a key={l} href={"#"+l.toLowerCase()} style={{display:"block",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13.5,color:"#999",textDecoration:"none",marginBottom:12}}>{l}</a>)}</div><div><h4 style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13,color:C.goldLight,letterSpacing:2,fontWeight:600,marginBottom:20}}>COMPANY</h4>{["Join the Waitlist","Contact","Privacy Policy","Terms"].map(l=><a key={l} href="#waitlist" style={{display:"block",fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:13.5,color:"#999",textDecoration:"none",marginBottom:12}}>{l}</a>)}</div></div><div style={{borderTop:"1px solid #333",marginTop:48,paddingTop:24,display:"flex",justifyContent:"space-between",flexWrap:"wrap",gap:16}}><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:"#666"}}>© 2026 Titus CRM. Built in Brisbane, Australia</div><div style={{fontFamily:"'Plus Jakarta Sans',sans-serif",fontSize:12,color:"#666"}}>www.tituscrm.com</div></div></div></footer>

    <button onClick={()=>setChatOpen(!chatOpen)} style={{position:"fixed",bottom:20,right:20,width:60,height:60,borderRadius:"50%",background:"linear-gradient(135deg,"+C.gold+","+C.goldLight+")",border:"none",cursor:"pointer",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999,boxShadow:"0 4px 20px "+C.gold+"44",animation:"glow 3s infinite"}}>{chatOpen?I.close:I.chat}</button>
    <Chatbot open={chatOpen} onClose={()=>setChatOpen(false)}/>
  
</div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
